<!DOCTYPE html>
<html>
<head>
    <title>Ordered and Unordered Lists</title>
</head>
<body>

    <h1>My Favorite Subjects</h1>

    <h2>Ordered List</h2>
    <ol>
        <li>Mathematics</li>
        <li>Science</li>
        <li>English</li>
        <li>Computer Science</li>
        <li>coding</li>
    </ol>

    <h2>Unordered List</h2>
    <ul>
        <li>Football</li>
        <li>Cricket</li>
        <li>Badminton</li>
        <li>Chess</li>
        <li>Swimming</li>
    </ul>

</body>
</html>
