<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animetion transform in css</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            background-color: rgb(171, 235, 22);
            border: 2px solid black;
            margin: 200px;
            transition: all 5s ease-in;
            padding: 50px;
            border-radius: 200px;
        }
        div:hover{
            background-color: red;
            color: white;
            font-size: 20px;
            /* transform: rotate(180deg); */
            /* transform: rotateZ(45deg); */
            /* transform: scale(2); */
            /* transform:scaleY(2); */
            /* transform: skew(45deg); */
            transform: skewY(2000deg);
        }
    </style>
</head>
<body>
    <div>  <b>PIKUL</b><br>ANIMATION</div>
</body>
</html>
