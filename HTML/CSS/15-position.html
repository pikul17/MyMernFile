<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position in css</title>
    <style>
        .container{
            height: 800px;
            width: 300px;
            background-color: gainsboro;
            margin: 100px;
        }
        .box{
            height: 100px;
            width: 100px;
        }
        .red{
            background-color: red;
            position: relative ;
            left: 100px;
            top: 100px;
        }
        .green{
            background-color: green;
            position: absolute;
            bottom: 0px;
            right: 0px;
        }
        .blue{
            background-color: blue;
            position: fixed;
            bottom: 50px;
            right: 50px;

        }
        .purple{
            background-color: purple;
            position: sticky;
            top: 100px;   
        }
        .specer{
            height: 300vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box red"></div>
        <div class="box green"></div>
        <div class="box blue"></div>
        <div class=" box purple"></div>
    </div>
    <div class="specer"></div>
</body>
</html>
