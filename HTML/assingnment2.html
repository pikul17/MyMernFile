<!DOCTYPE html>
<html lang="en">
<head>
    <title>Formating Tags Example</title>
</head>
<body>
    <h1>HTML Formating Tags</h1>
    <p><b>My second Assignment</b></p>
    <p><i>My second Assignment</i></p>
    <p><u>My second Assignment</u></p>
    <p><mark>My second Assignment</mark></p>
    <p>a<sup>2</sup>+b<sup>2</sup>+2ab</p>
    <p>H<sub>2</sub>O</p>
</body>
</html>
